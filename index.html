<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日行业链接面板</title>
    <style>
      :root {
        --bg: #f4efe7;
        --bg-accent: #efe3d2;
        --surface: rgba(255, 252, 247, 0.88);
        --surface-strong: #fffdf8;
        --line: rgba(87, 61, 38, 0.14);
        --text: #24180f;
        --muted: #6f5a48;
        --brand: #b85c38;
        --brand-deep: #8f3f20;
        --highlight: #e0b36d;
        --shadow: 0 24px 60px rgba(88, 54, 26, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Aptos", "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(224, 179, 109, 0.35), transparent 30%),
          radial-gradient(circle at top right, rgba(184, 92, 56, 0.18), transparent 28%),
          linear-gradient(180deg, var(--bg) 0%, #f8f4ee 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(87, 61, 38, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(87, 61, 38, 0.035) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.7), transparent 88%);
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0 72px;
      }

      .hero,
      .toolbar,
      .date-section,
      .empty-state {
        position: relative;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .hero {
        display: grid;
        grid-template-columns: 1.4fr 0.9fr;
        gap: 28px;
        padding: 32px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--brand);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 4vw, 56px);
        line-height: 1.02;
      }

      .hero-copy {
        max-width: 620px;
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      .hero-stats {
        display: grid;
        gap: 14px;
      }

      .hero-stats article {
        padding: 18px 20px;
        border-radius: 22px;
        background: var(--surface-strong);
        border: 1px solid rgba(87, 61, 38, 0.08);
      }

      .hero-stats span,
      .toolbar-tip,
      .date-label,
      .link-card time {
        color: var(--muted);
      }

      .hero-stats strong {
        display: block;
        margin-top: 10px;
        font-size: 24px;
      }

      .admin-link {
        color: var(--brand-deep);
        text-decoration: none;
      }

      .toolbar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-top: 22px;
        padding: 20px 24px;
      }

      .toolbar-main {
        width: min(760px, 100%);
      }

      .search {
        display: block;
        width: min(460px, 100%);
      }

      .search span {
        display: inline-block;
        margin-bottom: 10px;
        font-size: 13px;
        font-weight: 700;
        color: var(--brand-deep);
      }

      .search input {
        width: 100%;
        height: 52px;
        border: 1px solid rgba(87, 61, 38, 0.14);
        border-radius: 18px;
        padding: 0 16px;
        font: inherit;
        background: rgba(255, 255, 255, 0.9);
        color: var(--text);
      }

      .search input:focus {
        outline: 2px solid rgba(184, 92, 56, 0.22);
        border-color: rgba(184, 92, 56, 0.4);
      }

      .timeline {
        margin-top: 26px;
      }

      .keyword-line {
        margin: 14px 0 0;
        color: var(--brand-deep);
        line-height: 1.8;
      }

      .date-section {
        margin-top: 22px;
        padding: 24px;
      }

      .date-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }

      h2 {
        margin: 8px 0 0;
        font-size: 24px;
      }

      .date-count,
      .source-badge,
      .tag-row span,
      .card-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
      }

      .date-count {
        padding: 10px 14px;
        color: var(--brand-deep);
        background: rgba(224, 179, 109, 0.24);
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .link-card {
        display: flex;
        flex-direction: column;
        min-height: 260px;
        padding: 20px;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(250, 244, 236, 0.92));
        border: 1px solid rgba(87, 61, 38, 0.1);
      }

      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .source-badge {
        padding: 8px 12px;
        color: var(--brand-deep);
        background: rgba(184, 92, 56, 0.12);
        font-size: 13px;
        font-weight: 700;
      }

      h3 {
        margin: 18px 0 10px;
        font-size: 22px;
        line-height: 1.25;
      }

      .link-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .url-preview {
        word-break: break-all;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }

      .tag-row span {
        padding: 7px 10px;
        color: #4c3828;
        background: rgba(111, 90, 72, 0.08);
        font-size: 13px;
      }

      .card-actions {
        margin-top: auto;
        padding-top: 22px;
      }

      .card-actions a {
        min-width: 112px;
        padding: 12px 18px;
        color: #fff8f1;
        background: linear-gradient(135deg, var(--brand) 0%, #cb7b42 100%);
        text-decoration: none;
        font-weight: 700;
        transition: transform 160ms ease, box-shadow 160ms ease;
        box-shadow: 0 14px 24px rgba(184, 92, 56, 0.22);
      }

      .card-actions a:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 30px rgba(184, 92, 56, 0.28);
      }

      .empty-state {
        margin-top: 22px;
        padding: 36px 24px;
        text-align: center;
      }

      @media (max-width: 980px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .card-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 20px, 100%);
          padding-top: 20px;
        }

        .hero,
        .toolbar,
        .date-section {
          border-radius: 22px;
          padding: 18px;
        }

        .toolbar,
        .date-header,
        .card-top {
          flex-direction: column;
          align-items: stretch;
        }

        .card-grid {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 34px;
        }

        h3 {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="app"></div>
    </main>
    <script type="module" src="./dist/index.js"></script>
  </body>
</html>
