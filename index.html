<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日行业链接面板</title>
    <style>
      :root {
        --bg: #f4efe7;
        --bg-accent: #efe3d2;
        --surface: rgba(255, 252, 247, 0.88);
        --surface-strong: #fffdf8;
        --line: rgba(87, 61, 38, 0.14);
        --text: #24180f;
        --muted: #6f5a48;
        --brand: #b85c38;
        --brand-deep: #8f3f20;
        --highlight: #e0b36d;
        --shadow: 0 24px 60px rgba(88, 54, 26, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Aptos", "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(224, 179, 109, 0.35), transparent 30%),
          radial-gradient(circle at top right, rgba(184, 92, 56, 0.18), transparent 28%),
          linear-gradient(180deg, var(--bg) 0%, #f8f4ee 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(87, 61, 38, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(87, 61, 38, 0.035) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.7), transparent 88%);
      }

      main {
        width: calc(100% - 24px);
        max-width: none;
        margin: 0 auto;
        padding: 18px 0 40px;
      }

      .overview-panel,
      .day-stage,
      .empty-state {
        position: relative;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .page-frame {
        position: relative;
      }

      .overview-panel {
        padding: 20px 24px 18px;
      }

      .overview-head {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(540px, 0.9fr);
        gap: 20px;
        align-items: start;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--brand);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 3vw, 44px);
        line-height: 1.04;
      }

      .hero-copy {
        max-width: 860px;
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .hero-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .hero-stats article {
        padding: 14px 16px;
        border-radius: 18px;
        background: var(--surface-strong);
        border: 1px solid rgba(87, 61, 38, 0.08);
      }

      .hero-stats span,
      .toolbar-tip,
      .date-label,
      .link-card time {
        color: var(--muted);
      }

      .hero-stats strong {
        display: block;
        margin-top: 8px;
        font-size: 20px;
      }

      .admin-link {
        color: var(--brand-deep);
        text-decoration: none;
      }

      .overview-tools {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid rgba(87, 61, 38, 0.1);
      }

      .toolbar-main {
        width: min(920px, 100%);
      }

      .search {
        display: block;
        width: min(560px, 100%);
      }

      .search span {
        display: inline-block;
        margin-bottom: 10px;
        font-size: 13px;
        font-weight: 700;
        color: var(--brand-deep);
      }

      .search input {
        width: 100%;
        height: 46px;
        border: 1px solid rgba(87, 61, 38, 0.14);
        border-radius: 16px;
        padding: 0 16px;
        font: inherit;
        background: rgba(255, 255, 255, 0.9);
        color: var(--text);
      }

      .search input:focus {
        outline: 2px solid rgba(184, 92, 56, 0.22);
        border-color: rgba(184, 92, 56, 0.4);
      }

      .keyword-line {
        margin: 10px 0 0;
        color: var(--brand-deep);
        line-height: 1.6;
        font-size: 14px;
      }

      .day-stage {
        margin-top: 16px;
        padding: 20px;
      }

      .day-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }

      h2 {
        margin: 8px 0 0;
        font-size: 24px;
      }

      .date-count,
      .source-badge,
      .tag-row span,
      .card-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
      }

      .date-count {
        padding: 10px 14px;
        color: var(--brand-deep);
        background: rgba(224, 179, 109, 0.24);
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 14px;
      }

      .link-card {
        display: flex;
        flex-direction: column;
        min-height: 210px;
        padding: 16px;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(250, 244, 236, 0.92));
        border: 1px solid rgba(87, 61, 38, 0.1);
      }

      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .source-badge {
        padding: 7px 11px;
        color: var(--brand-deep);
        background: rgba(184, 92, 56, 0.12);
        font-size: 12px;
        font-weight: 700;
      }

      h3 {
        margin: 14px 0 8px;
        font-size: 18px;
        line-height: 1.25;
      }

      .link-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
        font-size: 13px;
      }

      .url-preview {
        word-break: break-all;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
      }

      .tag-row span {
        padding: 6px 8px;
        color: #4c3828;
        background: rgba(111, 90, 72, 0.08);
        font-size: 12px;
      }

      .card-actions {
        margin-top: auto;
        padding-top: 16px;
      }

      .card-actions a {
        min-width: 100px;
        padding: 10px 14px;
        color: #fff8f1;
        background: linear-gradient(135deg, var(--brand) 0%, #cb7b42 100%);
        text-decoration: none;
        font-weight: 700;
        font-size: 13px;
        transition: transform 160ms ease, box-shadow 160ms ease;
        box-shadow: 0 14px 24px rgba(184, 92, 56, 0.22);
      }

      .card-actions a:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 30px rgba(184, 92, 56, 0.28);
      }

      .day-nav {
        position: fixed;
        top: 50%;
        z-index: 20;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        min-width: 132px;
        padding: 14px 16px;
        border: 1px solid rgba(87, 61, 38, 0.16);
        border-radius: 999px;
        background: rgba(255, 252, 247, 0.95);
        color: var(--text);
        box-shadow: 0 18px 38px rgba(88, 54, 26, 0.16);
        transform: translateY(-50%);
        backdrop-filter: blur(18px);
        cursor: pointer;
      }

      .day-nav-prev {
        left: 24px;
      }

      .day-nav-next {
        right: 24px;
      }

      .day-nav:disabled {
        cursor: not-allowed;
        opacity: 0.45;
        box-shadow: none;
      }

      .nav-arrow {
        font-size: 26px;
        line-height: 1;
        color: var(--brand);
      }

      .nav-copy {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        text-align: left;
      }

      .nav-copy strong {
        font-size: 14px;
      }

      .nav-copy small {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .empty-state {
        margin-top: 22px;
        padding: 36px 24px;
        text-align: center;
      }

      .empty-alone {
        margin-top: 0;
      }

      @media (max-width: 1360px) {
        .card-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-width: 1180px) {
        .overview-head {
          grid-template-columns: 1fr;
        }

        .hero-stats {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .card-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .day-nav {
          top: auto;
          bottom: 20px;
          transform: none;
        }
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 20px, 100%);
          padding-top: 12px;
          padding-bottom: 100px;
        }

        .overview-panel,
        .day-stage {
          border-radius: 22px;
          padding: 18px;
        }

        .hero-stats {
          grid-template-columns: 1fr;
        }

        .overview-tools,
        .day-meta,
        .card-top {
          flex-direction: column;
          align-items: stretch;
        }

        .card-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        h1 {
          font-size: 30px;
        }

        h3 {
          font-size: 17px;
        }

        .day-nav {
          min-width: 0;
          padding: 12px 14px;
        }

        .day-nav-prev {
          left: 12px;
        }

        .day-nav-next {
          right: 12px;
        }

        .nav-copy small {
          display: none;
        }
      }

      @media (max-width: 560px) {
        .card-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="app"></div>
    </main>
    <script type="module" src="./dist/index.js"></script>
  </body>
</html>
