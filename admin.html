<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日链接录入后台</title>
    <style>
      :root {
        --bg: #f3eee5;
        --surface: rgba(255, 252, 247, 0.92);
        --line: rgba(87, 61, 38, 0.14);
        --text: #24180f;
        --muted: #6f5a48;
        --brand: #b85c38;
        --brand-deep: #8f3f20;
        --shadow: 0 24px 60px rgba(88, 54, 26, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Aptos", "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(224, 179, 109, 0.3), transparent 28%),
          linear-gradient(180deg, var(--bg) 0%, #faf7f2 100%);
      }

      main {
        width: min(960px, calc(100% - 24px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 28px;
        background: var(--surface);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
      }

      .panel-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--brand);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 4vw, 46px);
      }

      .copy {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .ghost-link,
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        text-decoration: none;
      }

      .ghost-link {
        min-width: 110px;
        padding: 12px 16px;
        color: var(--brand-deep);
        background: rgba(184, 92, 56, 0.1);
      }

      .entry-form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .full {
        grid-column: 1 / -1;
      }

      label span {
        display: inline-block;
        margin-bottom: 10px;
        font-size: 14px;
        font-weight: 700;
        color: var(--brand-deep);
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px 16px;
        font: inherit;
        color: var(--text);
        background: rgba(255, 255, 255, 0.92);
      }

      textarea {
        resize: vertical;
        min-height: 280px;
      }

      button {
        width: fit-content;
        min-width: 140px;
        border: 0;
        padding: 13px 20px;
        color: #fff8f1;
        background: linear-gradient(135deg, var(--brand) 0%, #cb7b42 100%);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .result {
        margin: 18px 0 0;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .panel {
          border-radius: 22px;
          padding: 18px;
        }

        .panel-head,
        .entry-form {
          grid-template-columns: 1fr;
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="admin-app"></div>
    </main>
    <script type="module" src="./dist/admin.js"></script>
  </body>
</html>
